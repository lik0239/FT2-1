<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FT2-1 Index</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      background: linear-gradient(180deg, #eef3fb 0%, #dfe8f7 100%);
      color: #1a2147;
    }

    .card {
      width: min(560px, 100%);
      padding: 32px 28px;
      border-radius: 20px;
      background: #ffffff;
      box-shadow: 0 20px 40px rgba(44, 63, 128, 0.12);
    }

    h1 {
      margin-bottom: 12px;
      font-size: 32px;
      line-height: 1.2;
    }

    .email {
      margin-bottom: 24px;
      color: #5f688d;
      font-size: 17px;
    }

    .links {
      display: grid;
      gap: 14px;
    }

    a {
      display: block;
      padding: 16px 18px;
      border-radius: 14px;
      background: #f3f6fd;
      color: #1a2147;
      text-decoration: none;
      font-size: 17px;
      font-weight: 700;
      transition: transform 0.18s ease, background-color 0.18s ease;
    }

    a:hover {
      transform: translateY(-2px);
      background: #e8eefb;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Hà Chí Hân</h1>
    <p class="email">Email: chihan1508@gmail.com</p>

    <nav class="links">
      <a href="./task1/FT2-1-task1.html">Task 1</a>
      <a href="./task2/FT2-1-task2.html">Task 2</a>
      <a href="./task3/FT2-1-task3.html">Task 3</a>
    </nav>
  </main>
</body>
</html>
