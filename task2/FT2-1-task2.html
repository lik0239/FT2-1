<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Form</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      background: #eef3fb;
      padding-top: 0;
    }

    .page {
      width: 320px;
      min-height: 334px;
    }

    .title {
      margin-top: 0;
      margin-bottom: 23px;
      text-align: center;
      font-size: 18px;
      line-height: 52px;
      font-weight: 700;
      color: #1b2559;
    }

    .card {
      background: #fff;
      border-radius: 6px;
      padding: 26px 24px 28px;
    }

    .field {
      margin-bottom: 22px;
    }

    .field-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    label {
      color: #222;
      font-size: 15px;
      line-height: 20px;
    }

    .forgot {
      color: #007bff;
      font-size: 15px;
      line-height: 20px;
      text-decoration: none;
    }

    input {
      width: 100%;
      height: 32px;
      border: 1px solid #d8d8d8;
      border-radius: 3px;
      padding: 0 8px;
      font-size: 14px;
      color: #222;
      outline: none;
    }

    input:focus {
      border-color: #7eb3ff;
      box-shadow: 0 0 0 2px rgba(0, 123, 255, 0.12);
    }

    .submit {
      width: 100%;
      height: 34px;
      margin-top: 2px;
      border: none;
      border-radius: 8px;
      background: #1387f2;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .footer {
      margin-top: 21px;
      text-align: center;
      color: #222;
      font-size: 15px;
      line-height: 20px;
    }

    .footer a {
      color: #007bff;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="page">
    <h1 class="title">Login</h1>

    <section class="card">
      <div class="field">
        <div class="field-row">
          <label for="email">Email</label>
        </div>
        <input id="email" type="email" value="example@email.com" />
      </div>

      <div class="field">
        <div class="field-row">
          <label for="password">Password</label>
          <a class="forgot" href="#">Forgot password?</a>
        </div>
        <input id="password" type="password" value="1234567890" />
      </div>

      <button class="submit" type="button">Login</button>

      <p class="footer">
        Don't have account?
        <a href="#">Create new account</a>
      </p>
    </section>
  </main>
</body>
</html>
